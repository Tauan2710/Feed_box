{% extends 'base.html' %}

{% block content %}
<h2>👤 Cadastrar Admin de Setor</h2>

<form method="post" class="card">
    {% csrf_token %}

    <label>Usuário</label>
    {{ form.username }}

    <label>Senha</label>
    {{ form.password }}

    <label>Setor</label>
    {{ form.setor }}

    <br><br>
    <button type="submit" class="btn btn-primary">Salvar</button>
</form>
{% endblock %}
