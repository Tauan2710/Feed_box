<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Feedbox{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            background-color: #f1f5f9; 
        }
        .bg-pattern {
            background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .navbar-blur {
            backdrop-filter: blur(8px);
            background-color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body class="bg-pattern min-h-screen">

    <nav class="navbar-blur border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            
            <div class="w-20 md:w-32"></div>

            <div class="flex items-center gap-2">
                <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd" />
                    </svg>
                </div>
                <span class="text-xl font-black text-gray-900 tracking-tighter uppercase italic">
                    Feed<span class="text-blue-600">box</span>
                </span>
            </div>

            <div class="w-20 md:w-32 flex justify-end">
                {% if request.path == '/enviar-feedback/' %}
                <a href="{% url 'login' %}" class="text-xs font-bold text-gray-600 hover:text-blue-600 border border-gray-200 px-4 py-2 rounded-lg hover:bg-white transition-all uppercase tracking-widest">
                    Login
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="py-8">
        <div class="animate__animated animate__fadeIn">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="py-12 text-center">
        <div class="flex flex-col items-center gap-2">
            <div class="h-px w-12 bg-gray-200 mb-2"></div>
            <p class="text-[10px] font-bold text-gray-300 uppercase tracking-[0.4em]">
                Feedbox &copy; 2026
            </p>
        </div>
    </footer>

</body>
</html>
