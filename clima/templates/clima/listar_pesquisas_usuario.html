<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pesquisas Disponíveis</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-black text-gray-800 mb-6">PESQUISAS <span class="text-green-600">ATIVAS</span></h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            {% for pesquisa in pesquisas %}
            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100">
                <h3 class="text-xl font-bold text-gray-800 mb-2">{{ pesquisa.titulo }}</h3>
                <p class="text-gray-500 text-sm mb-4">{{ pesquisa.descricao }}</p>
                
                <a href="{% url 'responder_pesquisa' pesquisa.id %}" 
                   class="block text-center bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 transition-all">
                    Responder Agora
                </a>
            </div>
            {% empty %}
            <p class="text-gray-400 italic">Não há pesquisas disponíveis no momento.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
