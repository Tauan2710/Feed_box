{% extends 'base.html' %}
{% block title %}Confirmar Exclusão{% endblock %}

{% block content %}
<script src="https://cdn.tailwindcss.com"></script>

<div class="max-w-md mx-auto p-6 mt-12">
    <div class="bg-white border border-red-100 p-8 rounded-3xl shadow-2xl shadow-red-100 text-center">
        <div class="bg-red-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>

        <h1 class="text-2xl font-black text-gray-800 uppercase italic mb-2">Atenção!</h1>
        <p class="text-gray-500 text-sm mb-8">
            Você está prestes a apagar a pesquisa <br>
            <strong class="text-gray-800">"{{ pesquisa.titulo }}"</strong>. <br><br>
            <span class="text-red-500 font-bold uppercase text-[10px]">Isso removerá todas as respostas vinculadas a ela permanentemente.</span>
        </p>

        <form method="POST" class="space-y-3">
            {% csrf_token %}
            <button type="submit" 
                    class="w-full bg-red-600 text-white font-black py-4 rounded-2xl hover:bg-red-700 transition-all uppercase text-xs tracking-widest shadow-lg shadow-red-200">
                Sim, Apagar Tudo
            </button>
            <a href="{% url 'listar_pesquisas' %}" 
               class="block w-full bg-gray-100 text-gray-500 font-black py-4 rounded-2xl hover:bg-gray-200 transition-all uppercase text-xs tracking-widest">
                Não, Voltar
            </a>
        </form>
    </div>
</div>
{% endblock %}
