<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Pesquisas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#F8FAFC] p-6 md:p-10">
    <div class="max-w-7xl mx-auto space-y-8">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800 italic uppercase tracking-tight">
                    Painel de <span class="text-blue-600">Gestão (ADMIN)</span>
                </h1>
                <p class="text-gray-500 text-sm font-medium">Gerencie e acompanhe as pesquisas cadastradas no banco de dados.</p>
            </div>
            <a href="{% url 'nova_pesquisa_clima' %}" class="bg-blue-600 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-blue-100 hover:bg-blue-700 transition flex items-center gap-2 w-fit">
                <i data-lucide="plus" class="w-4 h-4"></i> Nova Pesquisa
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for pesquisa in pesquisas %}
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 flex flex-col justify-between transition-all hover:shadow-md group">
                
                <div class="flex justify-between items-start">
                    <div class="space-y-1">
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Título da Pesquisa</p>
                        <h3 class="font-black text-xl text-slate-800 italic uppercase leading-tight">{{ pesquisa.titulo }}</h3>
                        <p class="text-[10px] text-gray-400 font-bold uppercase mt-2">ID: #{{ pesquisa.id }}</p>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-2xl text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors shadow-sm">
                        <i data-lucide="clipboard-list" class="w-6 h-6"></i>
                    </div>
                </div>

                <div class="mt-8 flex items-center gap-3">
                    <a href="{% url 'editar_pesquisa' pesquisa.id %}" class="flex-1 bg-amber-50 text-amber-600 border border-amber-100 px-4 py-2.5 rounded-xl text-[10px] font-black uppercase text-center hover:bg-amber-500 hover:text-white transition-all shadow-sm">
                        Editar
                    </a>
                    <a href="{% url 'excluir_pesquisa' pesquisa.id %}" class="flex-1 bg-red-50 text-red-600 border border-red-100 px-4 py-2.5 rounded-xl text-[10px] font-black uppercase text-center hover:bg-red-500 hover:text-white transition-all shadow-sm">
                        Excluir
                    </a>
                </div>
            </div>
            {% empty %}
            <div class="col-span-full py-20 text-center bg-white rounded-[2rem] border-2 border-dashed border-gray-200">
                <i data-lucide="search-x" class="w-12 h-12 text-gray-300 mx-auto mb-4"></i>
                <p class="text-gray-400 font-bold italic uppercase text-sm">Nenhuma pesquisa encontrada no banco de dados.</p>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
